<?xml version="1.0" encoding="UTF-8"?>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:t="https://github.com/phoswald/rstm/rstm-template">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Task Details</title>
  <link rel="icon" href="../../../images/java-logo.ico"/>
  <link rel="stylesheet" href="../../../rstm.css"/>
</head>
<body>
  <header>
    <img src="../../../images/java-logo.svg" alt="Java Logo"/>
    <span>RSTM Sample Service</span>
  </header>
  <nav>
    <a href="../../../">Home</a>
    <a href="../sample">Sample</a>
    <a href="../tasks">Tasks</a>
    <a href="" class="rstm-active">Details</a>
  </nav>
  <main>
    <h2>Task Details</h2>
    <p>
      <a class="rstm-button-outline" href="?action=edit">Edit</a>
    </p>
    <table>
      <tbody>
        <tr>
          <th>ID</th>
          <td t:text="taskId">ID</td>
        </tr>
        <tr>
          <th>Updated</th>
          <td t:text="timestamp">TIMESTAMP</td>
        </tr>
        <tr>
          <th>Title</th>
          <td t:text="title">TITLE</td>
        </tr>
        <tr>
          <th>Description</th>
          <td><pre t:text="description"></pre></td>
        </tr>
        <tr>
          <th></th>
          <td>
            <input type="checkbox" id="done" name="done" t:attr="checked=doneAsChecked" disabled="disabled"/>
            <label for="done">Done</label>
          </td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
