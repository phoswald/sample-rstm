<?xml version="1.0" encoding="UTF-8"?>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:t="https://github.com/phoswald/rstm/rstm-template">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Edit Task Details</title>
  <link rel="icon" href="../../../images/java-logo.ico"/>
  <link rel="stylesheet" href="../../../rstm.css"/>
</head>
<body>
  <header>
    <img src="../../../images/java-logo.svg" alt="Java Logo"/>
    <span>RSTM Sample Service</span>
  </header>
  <nav>
    <a href="../../../">Home</a>
    <a href="../sample">Sample</a>
    <a href="../tasks">Tasks</a>
    <a href="" class="rstm-active">Details</a>
  </nav>
  <main>
    <h2>Edit Task Details</h2>
    <p>
      <a class="rstm-button-outline" href="?">Cancel</a>
    </p>
    <form action="?" method="post" class="rstm-form-grid">
      <label for="id">ID:</label>
      <input type="text" id="id" name="id" t:attr="value=taskId" disabled="disabled"/>
      <label for="timestamp">Updated:</label>
      <input type="text" id="timestamp" name="timestamp" t:attr="value=timestamp" disabled="disabled"/>
      <label for="title">Title:</label>
      <input type="text" id="title" name="title" t:attr="value=title"/>
      <label for="description">Description:</label>
      <textarea id="description" name="description" rows="5" t:text="description"></textarea>
      <span>
        <input type="checkbox" id="done" name="done" t:attr="checked=doneAsChecked"/>
        <label for="done">Done</label>
      </span>
      <button type="submit" name="action" value="store">Store</button>
      <button type="submit" name="action" value="delete">Delete</button> <!-- TODO: change color -->
    </form>
  </main>
</body>
</html>
