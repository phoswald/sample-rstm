<?xml version="1.0" encoding="UTF-8"?>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:t="https://github.com/phoswald/rstm/rstm-template">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sample Page</title>
  <link rel="icon" href="../../images/java-logo.ico"/>
  <link rel="stylesheet" href="../../rstm.css"/>
</head>
<body>
  <header>
    <img src="../../images/java-logo.svg" alt="Java Logo"/>
    <span>RSTM Sample Service</span>
  </header>
  <nav>
    <a href="../../">Home</a>
    <a href="" class="rstm-active">Sample</a>
    <a href="tasks">Tasks</a>
  </nav>
  <main>
    <h2>Greeting</h2>
    <div class="rstm-alert-info">
      <span t:text="#greeting">MESSAGE</span>, <span t:text="username">USER</span>!
    </div>
    <h2>Config</h2>
    <p>The current time is <span t:text="now">TIMESTAMP</span>.</p>
    <table>
      <thead>
        <tr>
          <th>Parameter</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>app.sample.config</td>
          <td t:text="sampleConfig">VALUE</td>
        </tr>
      </tbody>
    </table>
    <h2>Environment Variables</h2>
    <table>
      <thead>
        <tr>
          <th>Variable</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        <tr t:each="env">
          <td t:text="key">KEY</td>
          <td t:text="value">VALUE</td>
        </tr>
      </tbody>
    </table>
    <h2>System Properties</h2>
    <table>
      <thead>
        <tr>
          <th>Property</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        <tr t:each="props">
          <td t:text="key">KEY</td>
          <td t:text="value">VALUE</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
