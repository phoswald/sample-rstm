<?xml version="1.0" encoding="UTF-8"?>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:t="https://github.com/phoswald/rstm/rstm-template">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tasks Overview</title>
  <link rel="icon" href="../../images/java-logo.ico"/>
  <link rel="stylesheet" href="../../rstm.css"/>
</head>
<body>
  <header>
    <img src="../../images/java-logo.svg" alt="Java Logo"/>
    <span>RSTM Sample Service</span>
  </header>
  <nav>
    <a href="../../">Home</a>
    <a href="sample">Sample</a>
    <a href="" class="rstm-active">Tasks</a>
  </nav>
  <main>
    <h2>Tasks Overview</h2>
    <form action="tasks" method="post">
      <table>
        <thead>
          <tr>
            <th>Done</th>
            <th>Title</th>
            <th>Updated</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr t:each="tasks">
            <td><input type="checkbox" name="done" t:attr="checked=doneAsChecked" disabled="disabled"/></td>
            <td t:text="title">TITLE</td>
            <td t:text="timestamp">TIMESTAMP</td>
            <td><a class="rstm-button-outline" t:attr="href=taskIdAsHref">Details</a></td>
          </tr>
          <tr>
            <td></td>
            <td><input type="text" name="title" value="New task..."/></td>
            <td></td>
            <td><input type="submit" value="Add"/></td>
          </tr>
        </tbody>
      </table>
    </form>
  </main>
</body>
</html>
