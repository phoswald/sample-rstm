<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="icon" href="images/java-logo.ico">
  <link rel="stylesheet" href="rstm.css">
</head>
<body>
  <header>
    <img src="images/java-logo.svg" alt="Java Logo">
    <span>RSTM Sample Service</span>
  </header>
  <main>
    <div class="rstm-box">
      <h2>Login</h2>
      <form action="login" method="post" class="rstm-form-grid">
        <span>Either login locally:</span>
        <label for="username">Username:</label>
        <input type="text"  id="username" name="username">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
        <button type="submit">Login</button>
        <span><br/>Or choose another login method:</span>
        <label>OAuth:</label>
        <a href="login?provider=dex" class="rstm-button-outline">
          <img src="images/dex-logo.png">
          Sign in with Dex
        </a>
        <a href="login?provider=google" class="rstm-button-outline">
          <img src="images/google-logo.svg">
          Sign in with Google
        </a>
        <a href="login?provider=microsoft" class="rstm-button-outline">
          <img src="images/microsoft-logo.svg">
          Sign in with Microsoft
        </a>
        <a href="login?provider=facebook" class="rstm-button-outline">
          <img src="images/facebook-logo.png">
          Sign in with Facebook
        </a>
        <!-- <a href="login?provider=apple" class="rstm-button-outline">
          <img src="images/apple-logo.svg">
          Sign in with Apple
        </a> -->
      </form>
    </div>
  </main>
</body>
</html>
